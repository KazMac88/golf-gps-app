<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a1f0a">
    <title>Golf GPS Navi</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0a0f0a;
            --surface:#141e04;
            --surface2:#1a2e1a;
            --surface3:#223322;
            --green-vivid:#00e676;
            --green-main:#4caf50;
            --green-dark:#2e7d32;
            --green-glow:rgba(0,230,118,0.15);
            --gold:#ffd740;
            --red:#ff5252;
            --blue:#448aff;
            --water:#40c4ff;
            --sand:#ffe082;
            --white:#fffffc;
            --text:#e8f5e9;
            --text-dim:rgba(255,255,255,0.5);
            --text-dimmer:rgba(255,255,255,0.3);
            --radius:16px;
            --radius-lg:24px;
            --shadow:0 8px 32px rgba(0,0,0,0.4);
            --glow:0 0 20px rgba(0,230,118,0.2);
        }
        body{
            font-family:'Inter',system-ui,-apple-system,sans-serif;
            background:var(--bg);color:var(--text);
            overflow:hidden;height:100vh;height:100dvh;
            -webkit-user-select:none;user-select:none;
            -webkit-tap-highlight-color:transparent;
        }

        /* ===== SPLASH ===== */
        #splash{
            position:fixed;inset:0;z-index:9999;
            background:var(--bg);
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            transition:opacity 0.6s cubic-bezier(.4,0,.2,1);
        }
        #splash.hidden{opacity:0;pointer-events:none}
        .splash-icon{
            width:100px;height:100px;
            background:linear-gradient(135deg,var(--green-vivid),var(--green-dark));
            border-radius:28px;
            display:flex;align-items:center;justify-content:center;
            font-size:52px;
            box-shadow:var(--glow),0 20px 60px rgba(0,230,118,0.15);
            animation:pulse-glow 2s ease-in-out infinite;
        }
        @keyframes pulse-glow{
            0%,100%{box-shadow:var(--glow),0 20px 60px rgba(0,230,118,0.15)}
            50%{box-shadow:0 0 40px rgba(0,230,118,0.3),0 20px 60px rgba(0,230,118,0.25)}
        }
        .splash-title{
            font-family:'Outfit',sans-serif;
            font-size:32px;font-weight:800;
            background:linear-gradient(135deg,var(--green-vivid),var(--white));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            margin-top:20px;letter-spacing:3px;
        }
        .splash-sub{color:var(--text-dim);font-size:13px;margin-top:6px;letter-spacing:1px;}
        .splash-loader{
            margin-top:48px;width:48px;height:48px;
            border:2px solid var(--surface3);border-top-color:var(--green-vivid);
            border-radius:50%;animation:spin .7s linear infinite;
        }
        @keyframes spin: {to { transform: rotate(360deg); }}

            if(!db.objectStoreNames.contains('settings'))db.createObjectStore('settings',{keyPath:'key'});
        };
        r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);
    });
}

// ---- Math ----
function haversine(lat1,lon1,lat2,lon2){
    const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function renderCourseList(filter=''){
    const courses=await getAllCourses();
    const section=document.getElementById('savedCoursesSection');
    const filtered=filter?courses.filter(c=>c.name.toLowerCase().includes(filter.toLowerCase())):courses;

    if(!filtered.length&&!filter){
        section.innerHTML=`<div class="empty-state"><div class="big">&#9971;</div><h3>&#12467;&#12540;&#12473;&#12364;&#12414;&#12384;&#12354;&#12426;&#12414;&#12379;&#12435;</h3><p>&#12300;&#21608;&#36794;&#12434;&#25506;&#12377;&#12301;&#12414;&#12383;&#12399;&#12300;&#26032;&#35215;&#36861;&#21152;&#12301;&#12391;&#22987;&#12417;&#12414;&#12375;&#12423;&#12358;</p></div>`;
        return;
    }
    if(!filtered.length){
        section.innerHTML=`<div class="empty-state" style="padding:24px"><p>&#12300;${escHtml(filter)}&#12301;&#12395;&#19968;&#33268;&#12377;&#12427;&#12467;&#12540;&#12473;&#12364;&#12354;&#12426;&#12414;&#12379;&#12435;</p></div>`;
        return;
    }
    const holesWithData=c=>{const hd=c.holeData||{};return Object.keys(hd).filter(k=>hd[k]?.green).length};

}

async function searchOSM(q){
    try{
        const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' golf japan')}&format=json&limit=10&countrycodes=jp`,{headers:{'Accept-Language':'ja'}});
        const d=await r.json();
        return d.filter(x=>x.display_name.toLowerCase().includes('golf')||x.display_name.includes('\u30B4\u30EB\u30D5')||x.type==='golf_course'||x.class==='leisure')
            .map(x=>({name:x.display_name.split(',')[0],lat:+x.lat,lon:+x.lon}));
    }catch{return[]}
}
